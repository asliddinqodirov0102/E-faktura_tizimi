<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Faktura | Boshqaruv Paneli</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon-wrap">🧾</div>
      <div class="logo-texts">
        <div class="logo-title">E-Faktura</div>
        <div class="logo-sub">Boshqaruv paneli</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <div class="nav-item active" data-page="dashboard"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></div>
      <div class="nav-item" data-page="products"><i data-lucide="package"></i><span>Mahsulotlar</span></div>
      <div class="nav-item" data-page="inventory"><i data-lucide="warehouse"></i><span>Ombor</span></div>
      <div class="nav-item" data-page="customers"><i data-lucide="users"></i><span>Mijozlar</span></div>
      <div class="nav-item" data-page="sell"><i data-lucide="shopping-cart"></i><span>Sotuv</span></div>
      <div class="nav-item" data-page="invoices"><i data-lucide="file-text"></i><span>Fakturalar</span></div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-name" id="userName">—</div>
        <div class="user-role" id="userRole">—</div>
      </div>
      <button class="btn-logout" id="logoutBtn">
        <i data-lucide="log-out"></i><span>Chiqish</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="header">
      <div class="header-title" id="pageTitle">Dashboard</div>
      <div class="header-actions" id="headerActions"></div>
    </header>
    <main class="content" id="pageContent">
      <div class="loading-state"><div class="spinner"></div><span>Yuklanmoqda...</span></div>
    </main>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle"></h3>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
