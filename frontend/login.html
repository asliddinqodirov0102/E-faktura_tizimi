<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish | E-Faktura Tizimi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080b14;
      overflow: hidden;
    }

    /* Animated background */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(16,185,129,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(139,92,246,0.05) 0%, transparent 70%);
    }
    .bg-orb {
      position: absolute; border-radius: 50%;
      animation: float 8s ease-in-out infinite;
      filter: blur(80px);
    }
    .orb1 { width:400px;height:400px;background:rgba(99,102,241,0.2);top:-100px;left:-100px;animation-delay:0s; }
    .orb2 { width:300px;height:300px;background:rgba(16,185,129,0.15);bottom:-50px;right:-50px;animation-delay:-3s; }
    .orb3 { width:200px;height:200px;background:rgba(245,158,11,0.1);top:50%;left:50%;animation-delay:-6s; }

    @keyframes float {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(30px,-30px) scale(1.05); }
      66% { transform: translate(-20px,20px) scale(0.95); }
    }

    /* Login card */
    .card {
      position: relative; z-index: 1;
      width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
    }
    .logo-title {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: block;
    }
    .logo-sub {
      color: #64748b;
      font-size: 13px;
      margin-top: 4px;
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      color: #f1f5f9;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }
    input:focus {
      border-color: #6366f1;
      background: rgba(99,102,241,0.08);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    input::placeholder { color: #475569; }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      box-shadow: 0 4px 15px rgba(99,102,241,0.4);
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99,102,241,0.5); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #fca5a5;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    .footer-text {
      text-align: center;
      color: #334155;
      font-size: 12px;
      margin-top: 32px;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>
  </div>

  <div class="card">
    <div class="logo">
      <span class="logo-icon">🧾</span>
      <span class="logo-title">E-Faktura Tizimi</span>
      <span class="logo-sub">Kiyim-kechak do'koni boshqaruvi</span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Foydalanuvchi nomi</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Parol</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Kirish</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>

    <div class="footer-text">© 2024 E-Faktura Tizimi. Barcha huquqlar himoyalangan.</div>
  </div>

  <script>
    const API = 'http://localhost:8000/api/v1';

    // Agar allaqachon login qilingan bo'lsa, app ga yo'naltirish
    if (localStorage.getItem('token')) {
      window.location.href = 'app.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errMsg = document.getElementById('errorMsg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Kirilmoqda...';
      errMsg.style.display = 'none';

      try {
        const form = new URLSearchParams();
        form.append('username', username);
        form.append('password', password);

        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: form,
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || 'Login yoki parol xato!');

        localStorage.setItem('token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user || {}));
        window.location.href = 'app.html';

      } catch (err) {
        errMsg.textContent = '❌ ' + (err.message || 'Ulanishda xatolik. Server ishlayaptimi?');
        errMsg.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Kirish';
      }
    });

    // Enter — password maydonida ham ishlaydi
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('loginForm').requestSubmit();
    });
  </script>
</body>
</html>
